    <header>
        <nav>

    <main>
        <h1>Resume/Contact/Donations</h1>
        <section id="resume">
            <h2>Resume</h2>
            <embed src="path/to/resume.pdf" type="application/pdf" width="100%" height="600px" />
            <a href="path/to/resume.pdf" download>Download My Resume</a>
        </section>
        <section id="contact">
            <h2>Contact</h2>
            <form id="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>
                <button type="submit">Send</button>
            </form>
        </section>
        <section id="donations">
            <h2>Donations</h2>
            <p>If you would like to support my work, you can make a donation through the following platforms:</p>
            <a href="https://www.paypal.com/donate?hosted_button_id=YOUR_BUTTON_ID" target="_blank">Donate via PayPal</a>
        </section>
    </main>
    <footer>
        <div class="social-icons">
            <a href="https://github.com/3m1l1032" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://linkedin.com/in/emilio-cazares-borbon" target="_blank"><i class="fab fa-linkedin"></i></a>
